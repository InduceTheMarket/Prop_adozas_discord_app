<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/@discord/embedded-app-sdk"></script>
    <title>TradingBox Kalkulátor</title>
    <style>
        :root { --discord-bg: #313338; --card-bg: #2B2D31; --blurple: #5865F2; --text: #DBDEE1; --red: #F23F43; --green: #23A559; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--discord-bg); color: var(--text); padding: 15px; }
        .container { background: var(--card-bg); padding: 20px; border-radius: 12px; max-width: 500px; margin: auto; border: 1px solid #4E5058; }
        .input-group { background: #1E1F22; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .row { display: flex; gap: 8px; margin-bottom: 10px; }
        input, select { background: #2B2D31; color: white; padding: 8px; border-radius: 4px; border: 1px solid #4E5058; flex: 1; min-width: 0; }
        button { border: none; border-radius: 4px; font-weight: bold; cursor: pointer; padding: 10px; transition: 0.2s; }
        .add-btn { background: var(--blurple); color: white; width: 100%; }
        .calc-all-btn { background: var(--green); color: white; width: 100%; margin-top: 15px; }
        .calc-all-btn:disabled { opacity: 0.5; cursor: wait; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #4E5058; }
        .summary-box { background: #232428; padding: 15px; border-radius: 8px; margin-top: 20px; border-left: 4px solid var(--red); display: none; }
    </style>
</head>
<body>

<div class="container">
    <h3 style="color:white; margin-top:0;">TradingBox Prop Adó</h3>

    <div class="input-group">
        <div class="row">
            <input type="date" id="pDate">
            <input type="number" id="pAmt" placeholder="Összeg">
            <select id="pCurr">
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
                <option value="GBP">GBP</option>
            </select>
        </div>
        <button type="button" class="add-btn" id="addBtn">Hozzáadás</button>
    </div>

    <table id="mainTable" style="display:none;">
        <thead><tr><th>Dátum</th><th>Összeg</th><th></th></tr></thead>
        <tbody id="payoutList"></tbody>
    </table>

    <button type="button" id="finalBtn" class="calc-all-btn" style="display:none;">ÁRFOLYAM LEKÉRÉS ÉS SZÁMÍTÁS</button>

    <div id="summary" class="summary-box">
        <div id="summaryContent"></div>
    </div>
</div>

<script>
    let rawItems = [];
    // AllOrigins proxy használata
    const PROXY = "https://api.allorigins.win/get?url=";

    // SDK indítás hiba nélkül
    try {
        const discordSdk = new Discord.EmbeddedAppSdk.DiscordSDK("1492149802480439317");
        discordSdk.ready();
    } catch(e) {}

    // Eseménykezelők bekötése (Discord-biztos módszer)
    window.onload = () => {
        document.getElementById('pDate').valueAsDate = new Date();
        document.getElementById('addBtn').onclick = addToList;
        document.getElementById('finalBtn').onclick = fetchAllAndCalculate;
    };

    function addToList() {
        const d = document.getElementById('pDate').value;
        const a = document.getElementById('pAmt').value;
        const c = document.getElementById('pCurr').value;
        if(!d || !a) return;

        rawItems.push({ date: d, amount: parseFloat(a), curr: c });
        document.getElementById('pAmt').value = "";
        render();
    }

    function render() {
        const hasItems = rawItems.length > 0;
        document.getElementById('mainTable').style.display = hasItems ? "table" : "none";
        document.getElementById('finalBtn').style.display = hasItems ? "block" : "none";
        
        const list = document.getElementById('payoutList');
        list.innerHTML = "";
        rawItems.forEach((item, i) => {
            const row = list.insertRow();
            row.innerHTML = `<td>${item.date}</td><td>${item.amount} ${item.curr}</td><td><button style="color:red;background:none" onclick="removeItem(${i})">×</button></td>`;
        });
    }

    function removeItem(i) {
        rawItems.splice(i, 1);
        render();
    }

    async function fetchAllAndCalculate() {
        const btn = document.getElementById('finalBtn');
        btn.disabled = true;
        btn.innerText = "MNB adatok letöltése...";

        try {
            // Rövidebb időintervallumot kérünk az MNB-től, hogy gyorsabb legyen a válasz
            const mnbUrl = "https://www.mnb.hu/arfolyam-tablazat?deviza=rbCustom&devizaSelected=USD&datefrom=2024.+01.+01.&datetill=2026.+12.+31.&order=1&customdeviza%5B%5D=EUR&customdeviza%5B%5D=USD&customdeviza%5B%5D=GBP";
            
            const response = await fetch(PROXY + encodeURIComponent(mnbUrl));
            if (!response.ok) throw new Error("Hálózati hiba");
            
            const json = await response.json();
            const parser = new DOMParser();
            const doc = parser.parseFromString(json.contents, "text/html");
            const rows = doc.querySelectorAll("table tbody tr");
            
            const months = {"január":"01","február":"02","március":"03","április":"04","május":"05","június":"06","július":"07","augusztus":"08","szeptember":"09","október":"10","november":"11","december":"12"};
            let rates = {};

            rows.forEach(r => {
                const td = r.querySelectorAll("td");
                if(td.length >= 4) {
                    const p = td[0].innerText.trim().split(' ');
                    const iso = `${p[0].replace('.','')}-${months[p[1].toLowerCase()]}-${p[2].replace('.','').padStart(2,'0')}`;
                    rates[iso] = {
                        "EUR": parseFloat(td[1].innerText.replace(',','.')),
                        "GBP": parseFloat(td[2].innerText.replace(',','.')),
                        "USD": parseFloat(td[3].innerText.replace(',','.'))
                    };
                }
            });

            let totalHuf = 0;
            rawItems.forEach(item => {
                let temp = new Date(item.date);
                for(let i=0; i<15; i++) {
                    let s = temp.toISOString().split('T')[0];
                    if(rates[s]) {
                        totalHuf += (item.amount * rates[s][item.curr]);
                        break;
                    }
                    temp.setDate(temp.getDate() - 1);
                }
            });

            const szja = Math.round(totalHuf * 0.15);
            const szocho = Math.round(totalHuf * 0.13);
            
            document.getElementById('summaryContent').innerHTML = `
                <p>Bruttó (HUF): <b>${Math.round(totalHuf).toLocaleString()} Ft</b></p>
                <p>SZJA (15%): <b>${szja.toLocaleString()} Ft</b></p>
                <p>SZOCHO (13%): <b>${szocho.toLocaleString()} Ft</b></p>
                <hr>
                <p style="color:var(--red)">Összes adó: <b>${(szja+szocho).toLocaleString()} Ft</b></p>
            `;
            document.getElementById('summary').style.display = "block";

        } catch(e) {
            alert("Hiba történt. Próbáld meg újra! " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "ÁRFOLYAM LEKÉRÉS ÉS SZÁMÍTÁS";
        }
    }
</script>
</body>
</html>
