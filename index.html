<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/@discord/embedded-app-sdk"></script>
    <title>TradingBox | Prop Firm Adó-Iránytű</title>
    <style>
        :root { --discord-bg: #313338; --card-bg: #2B2D31; --blurple: #5865F2; --text: #DBDEE1; --red: #F23F43; --green: #23A559; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--discord-bg); color: var(--text); padding: 20px; display: flex; justify-content: center; margin: 0; }
        .container { background: var(--card-bg); padding: 25px; border-radius: 12px; width: 100%; max-width: 600px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); border: 1px solid #4E5058; }
        .header-box { border-bottom: 2px solid var(--blurple); margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-end; }
        .header-box h2 { margin: 0; color: white; font-size: 1.5rem; }
        .brand-link { color: var(--blurple); text-decoration: none; font-size: 0.9rem; font-weight: bold; }
        .input-group { background: #1E1F22; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #4E5058; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        label { display: block; margin-bottom: 5px; font-size: 0.8rem; color: #B5BAC1; }
        input, select { background: #2B2D31; color: white; padding: 10px; border-radius: 5px; border: 1px solid #4E5058; flex: 1; min-width: 0; }
        button { border: none; border-radius: 5px; font-weight: bold; cursor: pointer; padding: 12px; }
        .add-btn { background: var(--blurple); color: white; width: 100%; }
        .calc-all-btn { background: var(--green); color: white; width: 100%; font-size: 1.1rem; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: #B5BAC1; border-bottom: 1px solid #4E5058; padding: 10px; }
        td { padding: 10px; border-bottom: 1px dotted #4E5058; }
        .summary-box { background: #232428; padding: 20px; border-radius: 8px; margin-top: 25px; border-left: 5px solid var(--red); display: none; }
        .grand-total { font-size: 1.5rem; color: var(--red); font-weight: bold; margin-top: 10px; border-top: 1px solid #4E5058; padding-top: 10px; }
        .warning-box { margin-top: 30px; padding: 15px; border: 2px solid var(--red); border-radius: 8px; background: rgba(242, 63, 67, 0.05); color: #FFFFFF; font-size: 0.85rem; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <div>
            <h2>TradingBox</h2>
            <small style="color: #B5BAC1;">Prop Firm Adózási Kalkulátor</small>
        </div>
        <a href="https://tradingbox.hu" target="_blank" class="brand-link">tradingbox.hu</a>
    </div>

    <div class="input-group">
        <div class="row">
            <div style="flex:2"><label>Kifizetés napja</label><input type="date" id="pDate"></div>
            <div style="flex:2"><label>Profit összege</label><input type="number" id="pAmt" placeholder="0.00"></div>
            <div style="flex:1"><label>Deviza</label>
                <select id="pCurr">
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="GBP">GBP</option>
                </select>
            </div>
        </div>
        <button type="button" class="add-btn" onclick="addToList()">+ TÉTEL HOZZÁADÁSA</button>
    </div>

    <table id="mainTable" style="display:none;">
        <thead><tr><th>Dátum</th><th>Összeg</th><th></th></tr></thead>
        <tbody id="payoutList"></tbody>
    </table>

    <button type="button" id="finalBtn" class="calc-all-btn" style="display:none;" onclick="fetchAllAndCalculate()">SZÁMÍTÁS AZ MNB ÁRFOLYAMOK ALAPJÁN</button>

    <div id="summary" class="summary-box">
        <div id="summaryContent"></div>
    </div>

    <div class="warning-box">
        <strong>Figyelem!</strong> Az adómérték és a szabályozás változhat. Ez a kalkulátor kizárólag tájékoztató jellegű, nem minősül adótanácsadásnak. A számítás az MNB hivatalos deviza-középárfolyamai alapján történik.
    </div>
</div>

<script>
    let rawItems = [];
    
    // A PROXY_URL-t úgy állítjuk be, hogy weben és Discordban is menjen
    const PROXY_URL = (window.location.hostname.includes('discordsays.com')) 
        ? "/proxy/get?url=" 
        : "https://api.allorigins.win/get?url=";

    document.getElementById('pDate').valueAsDate = new Date();

    function addToList() {
        const d = document.getElementById('pDate').value;
        const a = document.getElementById('pAmt').value;
        const c = document.getElementById('pCurr').value;
        if(!d || !a || a <= 0) return alert("Hibás adatok!");
        rawItems.push({ date: d, amount: parseFloat(a), curr: c });
        document.getElementById('pAmt').value = "";
        render();
    }

    function render() {
        const table = document.getElementById('mainTable');
        const list = document.getElementById('payoutList');
        const btn = document.getElementById('finalBtn');
        table.style.display = rawItems.length > 0 ? "table" : "none";
        btn.style.display = rawItems.length > 0 ? "block" : "none";
        list.innerHTML = "";
        rawItems.forEach((item, index) => {
            const row = list.insertRow();
            row.innerHTML = `<td>${item.date}</td><td>${item.amount.toLocaleString()} ${item.curr}</td>
            <td style="text-align:right;"><button onclick="removeItem(${index})" style="background:none; color:var(--red); font-weight:bold; font-size:1.2rem;">×</button></td>`;
        });
    }

    function removeItem(index) {
        rawItems.splice(index, 1);
        render();
    }

    async function fetchAllAndCalculate() {
        const btn = document.getElementById('finalBtn');
        btn.disabled = true;
        btn.innerText = "Lekérés folyamatban...";

        try {
            // Fontos: Az MNB URL-t kódoljuk a proxy után
            const mnbUrl = "https://www.mnb.hu/arfolyam-tablazat?deviza=rbCustom&devizaSelected=USD&datefrom=2024.+01.+01.&datetill=2026.+12.+31.&order=1&customdeviza%5B%5D=EUR&customdeviza%5B%5D=USD&customdeviza%5B%5D=GBP";
            
            const response = await fetch(PROXY_URL + encodeURIComponent(mnbUrl));
            const json = await response.json();
            
            const parser = new DOMParser();
            const doc = parser.parseFromString(json.contents, "text/html");
            const rows = doc.querySelectorAll("table tbody tr");
            const months = {"január":"01","február":"02","március":"03","április":"04","május":"05","június":"06","július":"07","augusztus":"08","szeptember":"09","október":"10","november":"11","december":"12"};
            
            let rates = {};
            rows.forEach(r => {
                const td = r.querySelectorAll("td");
                if(td.length >= 4) {
                    const p = td[0].innerText.trim().split(' ');
                    const iso = `${p[0].replace('.','')}-${months[p[1].toLowerCase()]}-${p[2].replace('.','').padStart(2,'0')}`;
                    rates[iso] = { 
                        "EUR": parseFloat(td[1].innerText.replace(',','.')), 
                        "GBP": parseFloat(td[2].innerText.replace(',','.')), 
                        "USD": parseFloat(td[3].innerText.replace(',','.')) 
                    };
                }
            });

            let totalHuf = 0;
            rawItems.forEach(item => {
                let temp = new Date(item.date);
                for(let i=0; i<15; i++) {
                    let s = temp.toISOString().split('T')[0];
                    if(rates[s]) {
                        totalHuf += (item.amount * rates[s][item.curr]);
                        break;
                    }
                    temp.setDate(temp.getDate() - 1);
                }
            });

            const szja = Math.round(totalHuf * 0.15);
            const szocho = Math.round(totalHuf * 0.13);

            document.getElementById('summaryContent').innerHTML = `
                <div style="display:flex; justify-content:space-between; color:white;"><span>Összesen (HUF):</span> <b>${Math.round(totalHuf).toLocaleString()} Ft</b></div>
                <div style="display:flex; justify-content:space-between; color:#B5BAC1;"><span>SZJA (15%):</span> <span>${szja.toLocaleString()} Ft</span></div>
                <div style="display:flex; justify-content:space-between; color:#B5BAC1;"><span>SZOCHO (13%):</span> <span>${szocho.toLocaleString()} Ft</span></div>
                <div class="grand-total" style="display:flex; justify-content:space-between"><span>ÖSSZES ADÓ:</span> <span>${(szja+szocho).toLocaleString()} Ft</span></div>
            `;
            document.getElementById('summary').style.display = "block";
        } catch(e) {
            alert("Hiba történt az adatok lekérésekor.");
        } finally {
            btn.disabled = false;
            btn.innerText = "SZÁMÍTÁS AZ MNB ÁRFOLYAMOK ALAPJÁN";
        }
    }
</script>
</body>
</html>
